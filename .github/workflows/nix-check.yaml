name: nix-check

on:
  push:
    branches-ignore:
      - main

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
    # For now we don't need this extra space.
    # Disabling this save ~2m for each run.
    # - name: Free Disk Space (Ubuntu)
    #   uses: jlumbroso/free-disk-space@v1.3.1
    - name: Checkout
      uses: actions/checkout@v5
    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-26.05
        extra_nix_config: |
          cores = 1
          max-jobs = 1
    - name: Enable cachix
      uses: cachix/cachix-action@v17
      with:
        name: duyngb
        authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
    - name: Run nix check
      run: >-
        nix run 'nixpkgs#nix-fast-build' -- --no-download --skip-cached --no-nom
