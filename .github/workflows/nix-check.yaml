name: nix-check

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    # For now we don't need this extra space.
    # Disabling this save ~2m for each run.
    # - name: Free Disk Space (Ubuntu)
    #   uses: jlumbroso/free-disk-space@v1.3.1

    - name: Checkout
      uses: actions/checkout@v7

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        install_options: --no-daemon
        nix_path: nixpkgs=flake:nixpkgs
        extra_nix_config: |
          cores = 1
          max-jobs = 1
          extra-substituters = https://cache.nixos-cuda.org
          extra-trusted-public-keys = cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=
          experimental-features = nix-command flakes

    - name: Restore and save nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.run_id }}
        restore-prefixes-first-match: |
          nix-${{ runner.os }}-
          nix-${{ runner.os }}
        gc-max-store-size-linux: 2G
        purge: true
        purge-prefixes: nix-${{ runner.os }}
        purge-created: PT30M
        purge-primary-key: never

    - name: Enable cachix
      uses: cachix/cachix-action@v17
      with:
        name: duyngb
        authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
        pushFilter: "(-source$|-vendor$|-vendor-staging$|-go-modules$)"

    - name: Pin nixpkgs
      run: nix registry pin nixpkgs github:NixOS/nixpkgs/nixos-26.05

    - name: Add nix-fast-build
      run: nix profile add nixpkgs#nix-fast-build

    - name: Run nix check
      run:
        nix-fast-build
          --no-download
          --skip-cached
          --no-nom
          --max-jobs 1
